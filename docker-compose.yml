services:
  postgres:
    image: postgres:17-alpine
    container_name: podevents-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: podevents
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d podevents"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
